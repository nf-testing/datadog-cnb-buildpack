# Cloud Native Buildpack descriptor for the Datadog Agent.
# This is what makes the difference vs. the upstream DataDog/heroku-buildpack-datadog
# repo, which is a classic Heroku buildpack (bin/compile) and cannot be loaded by
# CNB lifecycles such as the one behind Northflank's HEROKU_24 builder.
api = "0.10"

[buildpack]
  id = "northflank/datadog-agent"
  name = "Datadog Agent"
  version = "0.1.0"
  homepage = "https://github.com/nf-testing/datadog-cnb-buildpack"
  description = "Runs the Datadog Agent as a second process inside the container via .profile.d. Forked in spirit from DataDog/heroku-buildpack-datadog (classic), ported to CNB."

# Heroku-24 stack (what Northflank exposes as builder HEROKU_24).
# Also accept the generic io.buildpacks.stacks.* in case the lifecycle rejects
# an unrecognised stack id — detection is unconditional anyway.
[[stacks]]
  id = "heroku-24"

[[stacks]]
  id = "io.buildpacks.stacks.bionic"

[[stacks]]
  id = "*"
